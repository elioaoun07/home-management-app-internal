<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Outfits App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="58%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.22"/>

  <!-- Shirt draped over a hanger: only the hook shows above the collar,
       so there are no crossing lines. Every anchor mirrors about x=256. -->
  <g transform="translate(0,-24)" filter="url(#g)">

    <!-- Hanger hook, rising from behind the collar -->
    <path d="M256,196 L256,158 C256,138 238,138 238,156"
          fill="none" stroke="url(#accent)" stroke-width="12"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Shirt: sloped draped shoulders, hanging sleeves, straight body -->
    <path d="M234,206
             Q214,206 196,214
             L150,240
             Q142,245 144,252
             L152,308
             Q154,316 162,314
             L202,300
             Q208,298 208,306
             L208,410
             Q208,418 216,418
             L296,418
             Q304,418 304,410
             L304,306
             Q304,298 310,300
             L350,314
             Q358,316 360,308
             L368,252
             Q370,245 362,240
             L316,214
             Q298,206 278,206
             Q256,228 234,206
             Z"
          fill="#170c2b" stroke="url(#accent)" stroke-width="12"
          stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Centered placket + buttons -->
    <line x1="256" y1="240" x2="256" y2="380"
          stroke="url(#accent)" stroke-width="5" opacity="0.45" stroke-linecap="round"/>
    <circle cx="256" cy="268" r="6" fill="url(#accent)" opacity="0.8"/>
    <circle cx="256" cy="308" r="6" fill="url(#accent)" opacity="0.62"/>
    <circle cx="256" cy="348" r="6" fill="url(#accent)" opacity="0.48"/>
  </g>
</svg>
