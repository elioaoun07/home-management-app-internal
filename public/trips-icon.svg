<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Trips App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="caseGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feFlood flood-color="#0ea5e9" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="planeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feFlood flood-color="#f97316" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.2"/>

  <!-- Suitcase -->
  <g filter="url(#caseGlow)" transform="translate(256, 290)">
    <!-- Handle -->
    <rect x="-38" y="-98" width="76" height="42" rx="16" fill="none" stroke="url(#accent)" stroke-width="10"/>
    <!-- Body -->
    <rect x="-110" y="-60" width="220" height="150" rx="22" fill="#0f1d2e" stroke="url(#accent)" stroke-width="6"/>
    <!-- Middle band -->
    <rect x="-110" y="-2" width="220" height="18" fill="url(#accent)" opacity="0.55"/>
    <!-- Straps -->
    <rect x="-70" y="-60" width="12" height="150" fill="url(#accent)" opacity="0.35"/>
    <rect x="58" y="-60" width="12" height="150" fill="url(#accent)" opacity="0.35"/>
  </g>

  <!-- Paper plane taking off -->
  <g filter="url(#planeGlow)" transform="translate(330, 165) rotate(-28)">
    <path d="M0,0 L96,14 L18,34 L8,58 L-4,34 Z" fill="url(#accent2)"/>
    <path d="M0,0 L18,34 L8,58 Z" fill="#0f1d2e" opacity="0.35"/>
  </g>

  <!-- Motion trail -->
  <g opacity="0.5" stroke="url(#accent2)" stroke-width="6" stroke-linecap="round">
    <line x1="150" y1="200" x2="200" y2="188"/>
    <line x1="130" y1="222" x2="168" y2="212"/>
  </g>
</svg>
