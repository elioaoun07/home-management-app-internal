<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Dashboard App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.18"/>

  <!-- Main icon group -->
  <g filter="url(#iconGlow)" transform="translate(256,260)">

    <!-- Chart area / dashboard frame -->
    <rect x="-110" y="-100" width="220" height="170" rx="18" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3"/>

    <!-- Grid lines -->
    <line x1="-90" y1="-40" x2="90" y2="-40" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
    <line x1="-90" y1="0" x2="90" y2="0" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
    <line x1="-90" y1="40" x2="90" y2="40" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

    <!-- Bar chart bars -->
    <rect x="-75" y="10" width="28" height="50" rx="6" fill="url(#bar1)" opacity="0.9"/>
    <rect x="-35" y="-30" width="28" height="90" rx="6" fill="url(#bar2)" opacity="0.9"/>
    <rect x="5" y="-55" width="28" height="115" rx="6" fill="url(#bar1)" opacity="0.9"/>
    <rect x="45" y="-15" width="28" height="75" rx="6" fill="url(#bar3)" opacity="0.9"/>

    <!-- Trend line -->
    <polyline points="-61,5 -21,-35 19,-60 59,-20" fill="none" stroke="#f0abfc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- Trend dots -->
    <circle cx="-61" cy="5" r="4" fill="#f0abfc" opacity="0.9"/>
    <circle cx="-21" cy="-35" r="4" fill="#f0abfc" opacity="0.9"/>
    <circle cx="19" cy="-60" r="4" fill="#f0abfc" opacity="0.9"/>
    <circle cx="59" cy="-20" r="4" fill="#f0abfc" opacity="0.9"/>

    <!-- Top-left mini stat box -->
    <rect x="-90" y="-88" width="50" height="22" rx="5" fill="url(#accent)" opacity="0.15"/>
    <rect x="-84" y="-81" width="22" height="4" rx="2" fill="url(#accent)" opacity="0.5"/>
    <rect x="-84" y="-74" width="15" height="3" rx="1.5" fill="url(#accent)" opacity="0.3"/>

    <!-- Top-right mini stat box -->
    <rect x="40" y="-88" width="50" height="22" rx="5" fill="url(#accent)" opacity="0.15"/>
    <rect x="46" y="-81" width="22" height="4" rx="2" fill="url(#accent)" opacity="0.5"/>
    <rect x="46" y="-74" width="15" height="3" rx="1.5" fill="url(#accent)" opacity="0.3"/>
  </g>

  <!-- Decorative corner dots -->
  <circle cx="90" cy="90" r="4" fill="#3b82f6" opacity="0.25"/>
  <circle cx="422" cy="90" r="4" fill="#3b82f6" opacity="0.25"/>
  <circle cx="90" cy="422" r="4" fill="#3b82f6" opacity="0.25"/>
  <circle cx="422" cy="422" r="4" fill="#3b82f6" opacity="0.25"/>
</svg>
