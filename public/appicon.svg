<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Budget and Reminders App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.45"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.18"/>

  <!-- Main icon group -->
  <g filter="url(#iconGlow)" transform="translate(256,248)">

    <!-- Wallet body -->
    <rect x="-95" y="-58" width="190" height="116" rx="20" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3.5"/>
    <!-- Card lines -->
    <rect x="-74" y="-38" width="80" height="5" rx="2.5" fill="url(#accent)" opacity="0.45"/>
    <rect x="-74" y="-26" width="55" height="4" rx="2" fill="url(#accent)" opacity="0.25"/>
    <!-- Fold -->
    <line x1="-95" y1="-12" x2="95" y2="-12" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>

    <!-- Dollar badge -->
    <circle cx="42" cy="18" r="34" fill="#0a1628" stroke="url(#accent)" stroke-width="2.5"/>
    <text x="42" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="url(#accent)">$</text>

    <!-- Mini bar chart -->
    <g transform="translate(-52,22)">
      <rect x="0" y="-22" width="9" height="22" rx="2" fill="#38bdf8" opacity="0.75"/>
      <rect x="13" y="-32" width="9" height="32" rx="2" fill="#06b6d4" opacity="0.85"/>
      <rect x="26" y="-18" width="9" height="18" rx="2" fill="#14b8a6" opacity="0.75"/>
    </g>

    <!-- Bell (reminder) — top-right -->
    <g transform="translate(72,-52)" opacity="0.9">
      <path d="M0-18 C0-28 12-28 12-18 L14-6 C14-3 17 0 17 0 L-5 0 C-5 0 -2-3 -2-6 Z" fill="url(#accent)" stroke="none"/>
      <circle cx="6" cy="3" r="3.5" fill="url(#accent)"/>
    </g>
  </g>

  <!-- Corner dots -->
  <g filter="url(#dotGlow)">
    <circle cx="130" cy="130" r="4" fill="#38bdf8" opacity="0.7"/>
    <circle cx="382" cy="130" r="3.5" fill="#14b8a6" opacity="0.6"/>
    <circle cx="130" cy="382" r="3.5" fill="#06b6d4" opacity="0.6"/>
    <circle cx="382" cy="382" r="4" fill="#38bdf8" opacity="0.7"/>
  </g>
</svg>
