<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ERA App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#141433"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.5"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.22"/>

  <!-- Orbital rings -->
  <g transform="translate(256,256)" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.55">
    <ellipse cx="0" cy="0" rx="170" ry="70" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="170" ry="70" transform="rotate(35)"/>
  </g>

  <!-- Core orb -->
  <g filter="url(#g)" transform="translate(256,256)">
    <circle cx="0" cy="0" r="70" fill="url(#core)"/>
    <circle cx="-22" cy="-22" r="20" fill="#e0e7ff" opacity="0.65"/>
  </g>

  <!-- Orbiting nodes -->
  <g transform="translate(256,256)">
    <circle cx="150" cy="-40" r="13" fill="url(#accent)"/>
    <circle cx="-150" cy="40" r="13" fill="url(#accent)"/>
    <circle cx="60" cy="150" r="10" fill="#8b5cf6"/>
  </g>
</svg>
