<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0fdf4"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Grid of cards representing catalogue items -->
  <!-- Top left card -->
  <rect x="100" y="120" width="130" height="100" rx="12" fill="url(#cardGrad)" opacity="0.95"/>
  <rect x="115" y="140" width="60" height="8" rx="4" fill="#10b981"/>
  <rect x="115" y="158" width="100" height="6" rx="3" fill="#86efac"/>
  <rect x="115" y="172" width="80" height="6" rx="3" fill="#86efac"/>
  <circle cx="200" y="195" r="12" fill="#10b981" opacity="0.3"/>
  
  <!-- Top right card -->
  <rect x="250" y="120" width="130" height="100" rx="12" fill="url(#cardGrad)" opacity="0.95"/>
  <rect x="265" y="140" width="50" height="8" rx="4" fill="#059669"/>
  <rect x="265" y="158" width="100" height="6" rx="3" fill="#86efac"/>
  <rect x="265" y="172" width="70" height="6" rx="3" fill="#86efac"/>
  <rect x="320" y="188" width="40" height="16" rx="4" fill="#10b981" opacity="0.4"/>
  
  <!-- Bottom left card -->
  <rect x="100" y="240" width="130" height="100" rx="12" fill="url(#cardGrad)" opacity="0.95"/>
  <rect x="115" y="260" width="70" height="8" rx="4" fill="#047857"/>
  <rect x="115" y="278" width="100" height="6" rx="3" fill="#86efac"/>
  <rect x="115" y="292" width="90" height="6" rx="3" fill="#86efac"/>
  <rect x="115" y="310" width="30" height="14" rx="4" fill="#10b981" opacity="0.5"/>
  
  <!-- Bottom right card -->
  <rect x="250" y="240" width="130" height="100" rx="12" fill="url(#cardGrad)" opacity="0.95"/>
  <rect x="265" y="260" width="55" height="8" rx="4" fill="#10b981"/>
  <rect x="265" y="278" width="100" height="6" rx="3" fill="#86efac"/>
  <rect x="265" y="292" width="60" height="6" rx="3" fill="#86efac"/>
  <circle cx="350" y="315" r="10" fill="#059669" opacity="0.4"/>
  
  <!-- Plus button overlay -->
  <circle cx="400" cy="380" r="40" fill="#ffffff" opacity="0.95"/>
  <rect x="385" y="365" width="30" height="6" rx="3" fill="#10b981"/>
  <rect x="397" y="353" width="6" height="30" rx="3" fill="#10b981"/>
</svg>
