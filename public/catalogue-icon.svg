<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Catalogue App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feFlood flood-color="#10b981" flood-opacity="0.45"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background — same shape as main app -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.18"/>

  <!-- Main icon group -->
  <g filter="url(#iconGlow)" transform="translate(256,252)">

    <!-- Book / binder body -->
    <rect x="-90" y="-80" width="180" height="160" rx="14" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3.5"/>
    <!-- Spine -->
    <rect x="-90" y="-80" width="24" height="160" rx="14" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3.5"/>
    <line x1="-66" y1="-80" x2="-66" y2="80" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>

    <!-- Binding rings -->
    <circle cx="-66" cy="-48" r="5" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <circle cx="-66" cy="-12" r="5" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <circle cx="-66" cy="24" r="5" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <circle cx="-66" cy="60" r="5" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>

    <!-- Entry rows -->
    <rect x="-48" y="-56" width="110" height="5" rx="2.5" fill="url(#accent)" opacity="0.5"/>
    <rect x="-48" y="-44" width="75" height="4" rx="2" fill="url(#accent)" opacity="0.25"/>

    <rect x="-48" y="-24" width="100" height="5" rx="2.5" fill="url(#accent)" opacity="0.45"/>
    <rect x="-48" y="-12" width="60" height="4" rx="2" fill="url(#accent)" opacity="0.22"/>

    <rect x="-48" y="8" width="90" height="5" rx="2.5" fill="url(#accent)" opacity="0.4"/>
    <rect x="-48" y="20" width="70" height="4" rx="2" fill="url(#accent)" opacity="0.2"/>

    <rect x="-48" y="40" width="105" height="5" rx="2.5" fill="url(#accent)" opacity="0.35"/>
    <rect x="-48" y="52" width="55" height="4" rx="2" fill="url(#accent)" opacity="0.18"/>

    <!-- Checkmarks on right side of rows -->
    <g stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7">
      <polyline points="68,-52 72,-48 80,-56"/>
      <polyline points="68,-20 72,-16 80,-24"/>
    </g>
    <!-- Empty check box -->
    <rect x="66" y="6" width="14" height="14" rx="3" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
    <rect x="66" y="38" width="14" height="14" rx="3" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>

    <!-- Search icon — top-right -->
    <g transform="translate(72,-72)" opacity="0.85">
      <circle cx="0" cy="0" r="10" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
      <line x1="7" y1="7" x2="14" y2="14" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Corner dots — same positions as main app -->
  <g filter="url(#dotGlow)">
    <circle cx="130" cy="130" r="4" fill="#34d399" opacity="0.7"/>
    <circle cx="382" cy="130" r="3.5" fill="#059669" opacity="0.6"/>
    <circle cx="130" cy="382" r="3.5" fill="#10b981" opacity="0.6"/>
    <circle cx="382" cy="382" r="4" fill="#34d399" opacity="0.7"/>
  </g>
</svg>
