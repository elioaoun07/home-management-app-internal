<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AI Usage App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a1433"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="ring-track" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ring-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.45"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.22"/>

  <!-- Main icon group: radial usage gauge -->
  <g filter="url(#iconGlow)" transform="translate(256,256)">
    <!-- Track ring -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="url(#ring-track)" stroke-width="26"/>

    <!-- Progress arc (~72% of circumference, starts at top) -->
    <!-- circumference = 2*pi*130 ≈ 816.8; 72% ≈ 588 -->
    <circle cx="0" cy="0" r="130" fill="none"
            stroke="url(#ring-fill)" stroke-width="26" stroke-linecap="round"
            stroke-dasharray="588 229" transform="rotate(-90)"/>

    <!-- Ideal pace tick (at ~62%) -->
    <g transform="rotate(133)">
      <line x1="0" y1="-150" x2="0" y2="-110" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    </g>

    <!-- Center "AI" glyph with percent sign, stylized -->
    <g transform="translate(0,0)">
      <!-- Percent sign as abstract dots -->
      <circle cx="-42" cy="-28" r="10" fill="url(#accent)"/>
      <circle cx="42" cy="28" r="10" fill="url(#accent)"/>
      <line x1="-50" y1="32" x2="50" y2="-32" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Decorative corner dots -->
  <circle cx="90" cy="90" r="4" fill="#a78bfa" opacity="0.3"/>
  <circle cx="422" cy="90" r="4" fill="#38bdf8" opacity="0.3"/>
  <circle cx="90" cy="422" r="4" fill="#f472b6" opacity="0.3"/>
  <circle cx="422" cy="422" r="4" fill="#a78bfa" opacity="0.3"/>
</svg>
