name: Check docs sync

on:
  pull_request:
    paths:
      - CLAUDE.md
      - CODEX.md
      - .github/copilot-instructions.md

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify CLAUDE.md mirrors are in sync
        run: |
          # Generate expected mirrors from CLAUDE.md
          {
            echo '<!-- AUTO-GENERATED FROM CLAUDE.md — DO NOT EDIT DIRECTLY -->'
            echo ''
            cat CLAUDE.md
          } > /tmp/expected_mirror.md

          # Compare CODEX.md against expected mirror
          if ! diff -q CODEX.md /tmp/expected_mirror.md > /dev/null 2>&1; then
            echo "::error::CODEX.md is out of sync with CLAUDE.md"
            echo "To fix: run 'pnpm sync:ai' or edit CLAUDE.md and save (PostToolUse hook regenerates CODEX.md automatically)."
            diff --unified CODEX.md /tmp/expected_mirror.md || true
            exit 1
          fi

          # Compare .github/copilot-instructions.md against expected mirror
          if ! diff -q .github/copilot-instructions.md /tmp/expected_mirror.md > /dev/null 2>&1; then
            echo "::error::.github/copilot-instructions.md is out of sync with CLAUDE.md"
            echo "To fix: run 'pnpm sync:ai' or edit CLAUDE.md and save (PostToolUse hook regenerates it automatically)."
            diff --unified .github/copilot-instructions.md /tmp/expected_mirror.md || true
            exit 1
          fi

          echo "✓ CODEX.md and .github/copilot-instructions.md are in sync with CLAUDE.md"
