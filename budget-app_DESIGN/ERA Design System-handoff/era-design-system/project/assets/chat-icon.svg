<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Hub Chat App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"></stop>
      <stop offset="100%" stop-color="#162033"></stop>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"></stop>
      <stop offset="100%" stop-color="#0ea5e9"></stop>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"></stop>
      <stop offset="100%" stop-color="#a855f7"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="bubbleGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"></feGaussianBlur>
      <feFlood flood-color="#06b6d4" flood-opacity="0.4"></feFlood>
      <feComposite in2="b" operator="in"></feComposite>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="bubble2Glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"></feGaussianBlur>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.35"></feFlood>
      <feComposite in2="b" operator="in"></feComposite>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <rect width="512" height="512" rx="112" fill="url(#bg)"></rect>
  <rect width="512" height="512" rx="112" fill="url(#glow)"></rect>

  
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.2"></rect>

  
  <g filter="url(#bubbleGlow)" transform="translate(256, 220)">
    
    <path d="M-100,-70 h160 a25,25 0 0 1 25,25 v80 a25,25 0 0 1 -25,25 h-110 l-40,35 v-35 h-10 a25,25 0 0 1 -25,-25 v-80 a25,25 0 0 1 25,-25 z" fill="#0f1d2e" stroke="url(#accent)" stroke-width="4"></path>
    
    
    <rect x="-75" y="-45" width="100" height="8" rx="4" fill="url(#accent)" opacity="0.7"></rect>
    <rect x="-75" y="-25" width="70" height="8" rx="4" fill="url(#accent)" opacity="0.5"></rect>
    <rect x="-75" y="-5" width="85" height="8" rx="4" fill="url(#accent)" opacity="0.4"></rect>
  </g>

  
  <g filter="url(#bubble2Glow)" transform="translate(320, 320)">
    
    <path d="M-50,-40 h90 a18,18 0 0 1 18,18 v50 a18,18 0 0 1 -18,18 h-50 l25,25 v-25 h-47 a18,18 0 0 1 -18,-18 v-50 a18,18 0 0 1 18,-18 z" fill="#0f1d2e" stroke="url(#accent2)" stroke-width="3"></path>
    
    
    <rect x="-35" y="-22" width="55" height="6" rx="3" fill="url(#accent2)" opacity="0.6"></rect>
    <rect x="-35" y="-8" width="40" height="6" rx="3" fill="url(#accent2)" opacity="0.4"></rect>
  </g>

  
  <g transform="translate(180, 350)" opacity="0.6">
    <circle cx="0" cy="0" r="8" fill="url(#accent)"></circle>
    <circle cx="25" cy="0" r="8" fill="url(#accent)" opacity="0.7"></circle>
    <circle cx="50" cy="0" r="8" fill="url(#accent)" opacity="0.4"></circle>
  </g>
</svg>