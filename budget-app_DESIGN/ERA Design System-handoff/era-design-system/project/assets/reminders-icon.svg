<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Reminders App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"></stop>
      <stop offset="100%" stop-color="#162033"></stop>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"></stop>
      <stop offset="100%" stop-color="#f59e0b"></stop>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"></stop>
      <stop offset="100%" stop-color="#10b981"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"></feGaussianBlur>
      <feFlood flood-color="#f59e0b" flood-opacity="0.4"></feFlood>
      <feComposite in2="b" operator="in"></feComposite>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="bellGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"></feGaussianBlur>
      <feFlood flood-color="#fbbf24" flood-opacity="0.5"></feFlood>
      <feComposite in2="b" operator="in"></feComposite>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <rect width="512" height="512" rx="112" fill="url(#bg)"></rect>
  <rect width="512" height="512" rx="112" fill="url(#glow)"></rect>

  
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.18"></rect>

  
  <g filter="url(#iconGlow)" transform="translate(256,245)">

    
    <path d="M-60,20 C-60,-30 -50,-75 0,-80 C50,-75 60,-30 60,20 L-60,20 Z" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3.5"></path>
    
    
    <path d="M-72,20 L72,20 C72,20 70,42 0,42 C-70,42 -72,20 -72,20 Z" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3.5"></path>
    
    
    <circle cx="0" cy="50" r="10" fill="url(#accent)" opacity="0.8"></circle>
    
    
    <circle cx="0" cy="-80" r="8" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3"></circle>

    
    <path d="M-78,-10 C-95,-10 -95,25 -78,25" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"></path>
    <path d="M-88,-20 C-110,-20 -110,35 -88,35" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.3"></path>

    
    <path d="M78,-10 C95,-10 95,25 78,25" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"></path>
    <path d="M88,-20 C110,-20 110,35 88,35" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.3"></path>

    
    <g transform="translate(0,-25)">
      
      <rect x="-35" y="-20" width="30" height="4" rx="2" fill="url(#accent)" opacity="0.4"></rect>
      <rect x="-35" y="-8" width="24" height="4" rx="2" fill="url(#accent)" opacity="0.3"></rect>
      <rect x="-35" y="4" width="28" height="4" rx="2" fill="url(#accent)" opacity="0.25"></rect>
    </g>
  </g>

  
  <g filter="url(#bellGlow)">
    <circle cx="340" cy="155" r="22" fill="#ef4444"></circle>
    <text x="340" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white">3</text>
  </g>

  
  <circle cx="90" cy="90" r="4" fill="#f59e0b" opacity="0.25"></circle>
  <circle cx="422" cy="422" r="4" fill="#f59e0b" opacity="0.25"></circle>
</svg>