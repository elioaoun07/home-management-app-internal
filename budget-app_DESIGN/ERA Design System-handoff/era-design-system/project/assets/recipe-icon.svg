<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Recipe App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"></stop>
      <stop offset="100%" stop-color="#162033"></stop>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"></stop>
      <stop offset="100%" stop-color="#f97316"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"></feGaussianBlur>
      <feFlood flood-color="#f97316" flood-opacity="0.45"></feFlood>
      <feComposite in2="b" operator="in"></feComposite>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="dotGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"></feGaussianBlur>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <rect width="512" height="512" rx="112" fill="url(#bg)"></rect>
  <rect width="512" height="512" rx="112" fill="url(#glow)"></rect>

  
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.18"></rect>

  
  <g filter="url(#iconGlow)" transform="translate(256,252)">

    
    <ellipse cx="0" cy="-20" rx="70" ry="50" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3.5"></ellipse>
    
    <circle cx="-40" cy="-55" r="28" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3"></circle>
    <circle cx="0" cy="-68" r="30" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3"></circle>
    <circle cx="40" cy="-55" r="28" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3"></circle>
    
    <rect x="-70" y="-8" width="140" height="22" rx="6" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3"></rect>
    
    <line x1="-55" y1="3" x2="55" y2="3" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"></line>

    
    <g transform="translate(0,52)" opacity="0.85">
      
      <g transform="rotate(-25)">
        <rect x="-2" y="-20" width="4" height="50" rx="2" fill="url(#accent)" opacity="0.7"></rect>
        <rect x="-8" y="-28" width="3" height="14" rx="1.5" fill="url(#accent)" opacity="0.6"></rect>
        <rect x="-2" y="-28" width="3" height="14" rx="1.5" fill="url(#accent)" opacity="0.6"></rect>
        <rect x="4" y="-28" width="3" height="14" rx="1.5" fill="url(#accent)" opacity="0.6"></rect>
      </g>
      
      <g transform="rotate(25)">
        <rect x="-2" y="-16" width="4" height="46" rx="2" fill="url(#accent)" opacity="0.7"></rect>
        <ellipse cx="0" cy="-24" rx="8" ry="12" fill="url(#accent)" opacity="0.5"></ellipse>
      </g>
    </g>

    
    <g opacity="0.5" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round">
      <path d="M-20,-95 C-20,-105 -10,-105 -10,-115"></path>
      <path d="M5,-100 C5,-112 15,-112 15,-124"></path>
      <path d="M-8,-92 C-8,-100 0,-100 0,-108"></path>
    </g>

    
    <g transform="translate(72,-52)" opacity="0.85">
      <path d="M0-6 C-4-14 -14-14 -14-6 C-14 2 0 12 0 12 C0 12 14 2 14-6 C14-14 4-14 0-6Z" fill="url(#accent)" stroke="none" transform="scale(0.8)"></path>
    </g>
  </g>

  
  <g filter="url(#dotGlow)">
    <circle cx="130" cy="130" r="4" fill="#fb923c" opacity="0.7"></circle>
    <circle cx="382" cy="130" r="3.5" fill="#ea580c" opacity="0.6"></circle>
    <circle cx="130" cy="382" r="3.5" fill="#f97316" opacity="0.6"></circle>
    <circle cx="382" cy="382" r="4" fill="#fb923c" opacity="0.7"></circle>
  </g>
</svg>