<!doctype html>
<html data-theme="blue"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: var(--era-bg); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tile {
    padding: 14px; border-radius: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    height: 88px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2) inset;
    font: 500 11px var(--era-font-mono);
  }
  .name { font-weight: 600; font-size: 11px; }
  .val { opacity: 0.7; font-size: 10px; }
</style></head>
<body>
  <div class="grid">
    <div class="tile" style="background:#0a1628; color:#fff">
      <div class="name">bg</div><div class="val">#0a1628</div></div>
    <div class="tile" style="background:#0f1d2e; color:#fff">
      <div class="name">bg-medium</div><div class="val">#0f1d2e</div></div>
    <div class="tile" style="background:#1a2942; color:#fff">
      <div class="name">bg-card / surface</div><div class="val">#1a2942</div></div>
    <div class="tile" style="background:#1a2942; color:#38bdf8; box-shadow:0 0 0 1px rgba(6,182,212,0.3) inset, 0 0 20px rgba(59,130,246,0.2)">
      <div class="name">neo-card</div><div class="val">ring + glow</div></div>
  </div>
</body></html>
