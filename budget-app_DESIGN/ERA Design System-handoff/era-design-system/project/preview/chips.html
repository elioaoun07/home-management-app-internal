<!doctype html>
<html data-theme="blue"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 24px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .chip {
    height: 28px; padding: 0 12px;
    border-radius: 9999px;
    display: inline-flex; align-items: center; gap: 6px;
    font: 500 12px var(--era-font-body);
    color: var(--era-secondary);
    background: rgba(6,182,212,0.10);
    box-shadow: 0 0 0 1px rgba(6,182,212,0.3) inset;
  }
  .chip.amber { color: #fbbf24; background: rgba(251,191,36,0.10); box-shadow: 0 0 0 1px rgba(251,191,36,0.3) inset; }
  .chip.danger { color: #ef4444; background: rgba(239,68,68,0.10); box-shadow: 0 0 0 1px rgba(239,68,68,0.3) inset; }
  .chip.success { color: #10b981; background: rgba(16,185,129,0.10); box-shadow: 0 0 0 1px rgba(16,185,129,0.3) inset; }
  .chip.offline { color: #f59e0b; background: rgba(245,158,11,0.10); box-shadow: 0 0 0 1px rgba(245,158,11,0.3) inset; }
  .dot { width: 6px; height: 6px; border-radius: 9999px; background: currentColor; }
</style></head>
<body>
  <div class="row">
    <span class="chip"><span class="dot"></span>Synced</span>
    <span class="chip offline"><span class="dot"></span>Cached</span>
    <span class="chip amber">3 drafts</span>
    <span class="chip success">+ $42.00</span>
    <span class="chip danger">− $128.50</span>
    <span class="chip">$5</span>
    <span class="chip">$10</span>
    <span class="chip">$25</span>
  </div>
</body></html>
