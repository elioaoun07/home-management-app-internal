<!doctype html>
<html data-theme="blue"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 24px; }
  .wrap { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 16px; align-items: baseline; }
  .tag {
    font: 500 11px var(--era-font-mono);
    color: var(--era-fg-3);
    width: 120px; flex-shrink: 0;
  }
</style></head>
<body>
  <div class="wrap">
    <div class="row"><div class="tag">h1 / 32 · 700</div><div class="era-h1">Expense added!</div></div>
    <div class="row"><div class="tag">hero-money / 24</div><div class="era-hero-money">$1,248.50</div></div>
    <div class="row"><div class="tag">h3 / 18 · 600</div><div class="era-h3">Amount</div></div>
    <div class="row"><div class="tag">label / 16 · 600</div><div class="era-label">Description (optional)</div></div>
    <div class="row"><div class="tag">micro / 10 uppercase</div><div class="era-micro">Account Balance</div></div>
    <div class="row"><div class="tag">p / 16</div><div class="era-p">You're offline — balance not updated.</div></div>
    <div class="row"><div class="tag">muted / 16</div><div class="era-muted">0 pending offline transactions</div></div>
  </div>
</body></html>
