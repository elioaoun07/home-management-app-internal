<!doctype html>
<html data-theme="blue"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 24px; }
  .rows { display: grid; grid-template-columns: 110px 1fr; gap: 12px 20px; align-items: center; }
  .tag { font: 500 11px var(--era-font-mono); color: var(--era-fg-3); }
</style></head>
<body>
  <div class="rows">
    <div class="tag">Geist / body</div>
    <div style="font-family: var(--era-font-body); font-size: 18px; color: var(--era-fg-1);">Aa Bb Cc 1234 — Amount $12.50</div>

    <div class="tag">Geist Mono</div>
    <div class="era-mono" style="font-size: 16px; color: var(--era-fg-2);">$1,248.50  ·  L.L. 110,000,000</div>

    <div class="tag">Caveat</div>
    <div class="era-handwritten" style="font-size: 28px; color: var(--era-secondary);">notes from today</div>

    <div class="tag">Handlee</div>
    <div style="font-family: 'Handlee', cursive; font-size: 20px; color: var(--era-fg-1);">split with Alex</div>
  </div>
</body></html>
