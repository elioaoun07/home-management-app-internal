<!doctype html>
<html data-theme="blue"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 24px; }
  .card {
    width: 320px;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--era-bg-card);
    box-shadow: 0 0 0 1px rgba(6,182,212,0.3) inset, 0 0 20px rgba(59,130,246,0.2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .l { font: 500 10px var(--era-font-body); text-transform: uppercase; letter-spacing: 0.1em; color: var(--era-fg-2); margin-bottom: 6px; }
  .amt {
    font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums;
    background: linear-gradient(90deg,#22d3ee,#14b8a6,#67e8f9);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 6px rgba(6,182,212,0.5));
  }
  .sub { font: 500 12px var(--era-font-mono); color: var(--era-fg-3); margin-top: 2px; }
  .icon { width: 40px; height: 40px; border-radius: 9999px; background: rgba(6,182,212,0.1); box-shadow: 0 0 0 1px rgba(6,182,212,0.3) inset; display:flex; align-items:center; justify-content:center; color: var(--era-secondary); }
</style></head>
<body>
  <div class="card">
    <div>
      <div class="l">Account Balance</div>
      <div class="amt">$1,248.50</div>
      <div class="sub">L.L. 110,000,000</div>
    </div>
    <div class="icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
    </div>
  </div>
</body></html>
