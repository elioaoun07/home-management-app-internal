<!doctype html>
<html data-theme="frost"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 128px; }
  .chip {
    height: 72px; border-radius: 12px;
    box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.15) inset, 0 1px 3px rgba(15,23,42,0.06);
    display: flex; align-items: flex-end; padding: 8px;
    font: 600 10px var(--era-font-mono);
    color: rgba(255,255,255,0.95);
  }
  .lbl { display:flex; justify-content: space-between; margin-top: 6px; font: 500 11px var(--era-font-mono); color: var(--era-fg-3); }
  .lbl b { color: var(--era-fg-1); font-weight: 600; }
</style></head>
<body style="background:#f8fafc">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#6366f1">primary</div><div class="lbl"><b>Primary</b><span>#6366f1</span></div></div>
    <div class="sw"><div class="chip" style="background:#8b5cf6">secondary</div><div class="lbl"><b>Secondary</b><span>#8b5cf6</span></div></div>
    <div class="sw"><div class="chip" style="background:#a78bfa">accent</div><div class="lbl"><b>Accent</b><span>#a78bfa</span></div></div>
    <div class="sw"><div class="chip" style="background:#ffffff; color:#0f172a">bg-card</div><div class="lbl"><b>Card</b><span>#ffffff</span></div></div>
    <div class="sw"><div class="chip" style="background:#f8fafc; color:#0f172a">bg</div><div class="lbl"><b>Bg</b><span>#f8fafc</span></div></div>
  </div>
</body></html>
