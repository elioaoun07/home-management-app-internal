<!doctype html>
<html data-theme="pink"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 128px; }
  .chip {
    height: 72px; border-radius: 12px;
    box-shadow: 0 0 0 1px rgba(236, 72, 153, 0.3) inset, 0 0 20px rgba(236, 72, 153, 0.15);
    display: flex; align-items: flex-end; padding: 8px;
    font: 600 10px var(--era-font-mono);
    color: rgba(255,255,255,0.9);
  }
  .lbl { display:flex; justify-content: space-between; margin-top: 6px; font: 500 11px var(--era-font-mono); color: var(--era-fg-3); }
  .lbl b { color: var(--era-fg-1); font-weight: 600; }
</style></head>
<body style="background:#1a0a14">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ec4899">primary</div><div class="lbl"><b>Primary</b><span>#ec4899</span></div></div>
    <div class="sw"><div class="chip" style="background:#f472b6">secondary</div><div class="lbl"><b>Secondary</b><span>#f472b6</span></div></div>
    <div class="sw"><div class="chip" style="background:#f9a8d4; color:#1a0a00">accent</div><div class="lbl"><b>Accent</b><span>#f9a8d4</span></div></div>
    <div class="sw"><div class="chip" style="background:#fbbf24; color:#1a0a00">amber</div><div class="lbl"><b>Amber</b><span>#fbbf24</span></div></div>
    <div class="sw"><div class="chip" style="background:#1a0a14">bg</div><div class="lbl"><b>Bg</b><span>#1a0a14</span></div></div>
  </div>
</body></html>
