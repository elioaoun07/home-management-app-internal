<!doctype html>
<html data-theme="blue"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 24px; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .step {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    min-width: 72px;
  }
  .pip {
    width: 32px; height: 32px; border-radius: 9999px;
    display: flex; align-items: center; justify-content: center;
    font: 600 12px var(--era-font-mono);
    background: rgba(6,182,212,0.10); color: var(--era-fg-3);
    box-shadow: 0 0 0 1px rgba(6,182,212,0.2) inset;
  }
  .step.done .pip { background: rgba(16,185,129,0.15); color:#10b981; box-shadow: 0 0 0 1px rgba(16,185,129,0.5) inset; }
  .step.current .pip { background: linear-gradient(90deg,#3b82f6,#06b6d4); color:#fff; box-shadow: 0 0 20px rgba(6,182,212,0.5); }
  .t { font: 500 10px var(--era-font-mono); color: var(--era-fg-3); text-transform: uppercase; letter-spacing: 0.1em; }
  .bar { flex:1; height: 2px; background: rgba(6,182,212,0.2); min-width: 20px; max-width: 40px; }
  .bar.done { background: #10b981; }
</style></head>
<body>
  <div class="row">
    <div class="step done"><div class="pip">✓</div><div class="t">Amount</div></div>
    <div class="bar done"></div>
    <div class="step current"><div class="pip">2</div><div class="t">Category</div></div>
    <div class="bar"></div>
    <div class="step"><div class="pip">3</div><div class="t">Sub</div></div>
    <div class="bar"></div>
    <div class="step"><div class="pip">4</div><div class="t">Confirm</div></div>
  </div>
</body></html>
