<!doctype html>
<html data-theme="calm"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 128px; }
  .chip {
    height: 72px; border-radius: 12px;
    box-shadow: 0 0 0 1px rgba(120,113,108,0.3) inset, 0 2px 8px rgba(28,25,23,0.3);
    display: flex; align-items: flex-end; padding: 8px;
    font: 600 10px var(--era-font-mono);
    color: rgba(255,255,255,0.85);
  }
  .lbl { display:flex; justify-content: space-between; margin-top: 6px; font: 500 11px var(--era-font-mono); color: var(--era-fg-3); }
  .lbl b { color: var(--era-fg-1); font-weight: 600; }
</style></head>
<body style="background:#1c1917">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#78716c">primary</div><div class="lbl"><b>Primary</b><span>#78716c</span></div></div>
    <div class="sw"><div class="chip" style="background:#a8a29e">secondary</div><div class="lbl"><b>Secondary</b><span>#a8a29e</span></div></div>
    <div class="sw"><div class="chip" style="background:#d6cfc7; color:#1c1917">accent</div><div class="lbl"><b>Accent</b><span>#d6cfc7</span></div></div>
    <div class="sw"><div class="chip" style="background:#84a98c">teal</div><div class="lbl"><b>Teal</b><span>#84a98c</span></div></div>
    <div class="sw"><div class="chip" style="background:#44403c">bg-card</div><div class="lbl"><b>Card</b><span>#44403c</span></div></div>
  </div>
</body></html>
