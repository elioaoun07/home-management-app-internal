<!doctype html>
<html data-theme="blue"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding: 24px; background: var(--era-bg); }
  .wrap { display: flex; gap: 24px; align-items: center; }
  .mark img { width: 96px; height: 96px; border-radius: 20px; box-shadow: 0 8px 32px rgba(59,130,246,0.3); }
  .right { display:flex; flex-direction: column; gap: 2px; }
  .t { font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
       background: linear-gradient(90deg,#22d3ee,#14b8a6,#67e8f9);
       -webkit-background-clip: text; background-clip: text; color: transparent;
       filter: drop-shadow(0 0 8px rgba(6,182,212,0.5));
  }
  .s { font: 500 11px var(--era-font-mono); color: var(--era-fg-3); text-transform: uppercase; letter-spacing: 0.15em; }
</style></head>
<body>
  <div class="wrap">
    <div class="mark"><img src="../assets/appicon-512.png"></div>
    <div class="right">
      <div class="s">home manager</div>
      <div class="t">ERA.AI</div>
      <div class="s">personal finance · offline-first</div>
    </div>
  </div>
</body></html>
