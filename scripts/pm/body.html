
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>PM Command Center</h1>
      <div id="generated-at"></div>
      <label id="hide-completed-row" for="hide-completed-toggle">
        <input type="checkbox" id="hide-completed-toggle">
        <span>Hide completed items</span>
      </label>
      <input id="search" placeholder="Search docs... ( / )" autocomplete="off">
      <div id="search-results"></div>
    </div>
    <nav id="tree"></nav>
  </aside>
  <button id="sidebar-toggle" aria-label="Toggle navigation"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
  <main id="content">
    <div id="topbar"><div id="breadcrumb"></div></div>
    <div class="wrap" id="view"></div>
  </main>
</div>
<div id="preview-backdrop"></div>
<aside id="preview">
  <div id="preview-head">
    <span id="preview-name"></span>
    <span id="preview-lang"></span>
    <a id="preview-open" target="_blank" rel="noopener">Open in VS Code <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 4h6v6M20 4l-9 9"/><path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"/></svg></a>
    <button id="preview-close" title="Close (Esc)" aria-label="Close preview"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg></button>
  </div>
  <div id="preview-body"><pre><code id="preview-code"></code></pre></div>
</aside>
<div id="pm-modal-backdrop"></div>
<div id="pm-modal" role="dialog" aria-modal="true" aria-labelledby="pm-modal-title">
  <h3 id="pm-modal-title"></h3>
  <div class="pm-modal-body" id="pm-modal-body"></div>
  <div class="pm-modal-foot" id="pm-modal-foot"></div>
</div>
