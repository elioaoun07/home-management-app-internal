<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PM Command Center App Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lane1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lane2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lane3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.18"/>

  <!-- Main icon group: kanban board with lanes + check -->
  <g filter="url(#iconGlow)" transform="translate(256,256)">

    <!-- Board frame -->
    <rect x="-110" y="-104" width="220" height="196" rx="18" fill="#0f1d2e" stroke="url(#accent)" stroke-width="3"/>

    <!-- Header bar -->
    <rect x="-92" y="-88" width="70" height="10" rx="5" fill="url(#accent)" opacity="0.55"/>
    <circle cx="76" cy="-83" r="7" fill="url(#accent)" opacity="0.5"/>

    <!-- Lane 1 (Now) -->
    <rect x="-92" y="-58" width="56" height="12" rx="6" fill="url(#lane1)" opacity="0.85"/>
    <rect x="-92" y="-38" width="56" height="30" rx="8" fill="url(#lane1)" opacity="0.28"/>
    <rect x="-92" y="0" width="56" height="30" rx="8" fill="url(#lane1)" opacity="0.28"/>

    <!-- Lane 2 (Next) -->
    <rect x="-24" y="-58" width="56" height="12" rx="6" fill="url(#lane2)" opacity="0.85"/>
    <rect x="-24" y="-38" width="56" height="30" rx="8" fill="url(#lane2)" opacity="0.28"/>
    <rect x="-24" y="0" width="56" height="46" rx="8" fill="url(#lane2)" opacity="0.28"/>

    <!-- Lane 3 (Later) -->
    <rect x="44" y="-58" width="48" height="12" rx="6" fill="url(#lane3)" opacity="0.85"/>
    <rect x="44" y="-38" width="48" height="30" rx="8" fill="url(#lane3)" opacity="0.28"/>

    <!-- Check badge (bottom-right, overlapping the frame) -->
    <circle cx="82" cy="62" r="38" fill="#0f1d2e" stroke="#f0abfc" stroke-width="3.5"/>
    <path d="M 64 62 L 77 76 L 102 48" fill="none" stroke="#f0abfc" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Decorative corner dots -->
  <circle cx="90" cy="90" r="4" fill="#3b82f6" opacity="0.25"/>
  <circle cx="422" cy="90" r="4" fill="#3b82f6" opacity="0.25"/>
  <circle cx="90" cy="422" r="4" fill="#3b82f6" opacity="0.25"/>
  <circle cx="422" cy="422" r="4" fill="#3b82f6" opacity="0.25"/>
</svg>
